general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
}

listener {
    timeout = 300          # seconds = 5 minutes
    on-timeout = hyprlock  # lock after 5 min
}

listener {
    timeout = 600          # optional: turn off screen after 10 min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

